  <style>
    :root {
      --ink: #1a1a1a;
      --ink-light: #555;
      --ink-faint: #999;
      --paper: #faf9f7;
      --rule: #ddd;
      --accent: #1a3a6b;
      --max: 780px;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      font-size: 16px;
      background: var(--paper);
      color: var(--ink);
    }

    body {
      font-family: 'Crimson Pro', Georgia, serif;
      font-weight: 300;
      line-height: 1.7;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 1.5rem;
    }

    /* ── Header ── */
    header {
      width: 100%;
      max-width: var(--max);
      padding: 3.5rem 0 2rem;
      border-bottom: 1px solid var(--rule);
    }

    .eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 300;
      font-size: 0.68rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.9rem;
    }

    h1 {
      font-size: clamp(1.35rem, 3vw, 1.75rem);
      font-weight: 400;
      line-height: 1.3;
      color: var(--ink);
      margin-bottom: 0.5rem;
      max-width: 30ch;
    }

    .subtitle {
      font-size: 0.95rem;
      color: var(--ink-light);
      font-style: italic;
    }

    /* ── Main ── */
    main {
      width: 100%;
      max-width: var(--max);
      padding: 2.5rem 0 4rem;
    }

    /* ── Figure block ── */
    .figure-block {
      margin-bottom: 2.5rem;
    }

    .figure-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--ink-faint);
      margin-bottom: 0.75rem;
    }

    .figure-frame {
      border: 1px solid var(--rule);
      background: #fff;
      padding: 1.25rem;
      display: inline-flex;
      width: 100%;
      justify-content: center;
      align-items: center;
    }

    .figure-frame img {
      max-width: 100%;
      height: auto;
      display: block;
    }

    /* Placeholder shown when no image is provided */
    .placeholder {
      width: 100%;
      aspect-ratio: 16 / 9;
      background: repeating-linear-gradient(
        -45deg,
        #f4f3f1,
        #f4f3f1 4px,
        #faf9f7 4px,
        #faf9f7 14px
      );
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      color: var(--ink-faint);
    }

    .placeholder span {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
    }

    /* ── Caption ── */
    figcaption {
      margin-top: 1rem;
      font-size: 0.92rem;
      color: var(--ink-light);
      line-height: 1.65;
      max-width: 90ch;
    }

    figcaption strong {
      font-weight: 600;
      color: var(--ink);
    }

    /* ── Description section ── */
    .description {
      padding-top: 2rem;
      border-top: 1px solid var(--rule);
    }

    .description p {
      font-size: 1.05rem;
      color: var(--ink-light);
      max-width: 65ch;
      line-height: 1.8;
    }

    /* ── Footer ── */
    footer {
      width: 100%;
      max-width: var(--max);
      padding: 1.5rem 0 2.5rem;
      border-top: 1px solid var(--rule);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .footer-note {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      color: var(--ink-faint);
      text-transform: uppercase;
    }

    /* ── Fade-in ── */
    @keyframes fadein {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    header, main, footer {
      animation: fadein 0.5s ease both;
    }

    main {
      animation-delay: 0.08s;
    }

    footer {
      animation-delay: 0.14s;
    }
  </style>
</head>

      <strong>Figure 1.</strong>
      $\text{Uncertainty estimation for a binary classification problem, where }p(y|x)=0.5\times(\sin(1/(5x^3))+1).\text{ There are two panels for each model type. The panel on
      top shows the training data as the blue marks, the true probability of $y$ given $x$ and the models' probabilities predictions. The panel on the bottom
      shows the aleatoric and epistemic uncertainty estimates, and the true aleatoric uncertainty (entropy of the true conditional probability). We see that when the model bias is high, aleatoric uncertainty is
      inflated and epistemic uncertainty is underestimated.}$
